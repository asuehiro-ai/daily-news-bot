name: 面談ログ・議事録内容の空欄修復

on:
  workflow_dispatch:
    inputs:
      from_date:
        description: '開始日 (YYYY-MM-DD)'
        required: true
      to_date:
        description: '終了日 (YYYY-MM-DD、省略時は前日)'
        required: false
      dry_run:
        description: 'true にすると更新せず内容確認のみ'
        required: false
        default: 'true'

jobs:
  repair:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージのインストール
        run: pip install -r requirements.txt

      - name: 議事録内容の空欄修復実行
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          PLAUD_TOKEN: ${{ secrets.PLAUD_TOKEN }}
          PLAUD_BASE_URL: ${{ secrets.PLAUD_BASE_URL }}
          FROM_DATE: ${{ github.event.inputs.from_date }}
          TO_DATE: ${{ github.event.inputs.to_date }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          ARGS="--from $FROM_DATE"
          if [ -n "$TO_DATE" ]; then ARGS="$ARGS --to $TO_DATE"; fi
          if [ "$DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python meeting-log-sync/repair_missing_transcripts.py $ARGS
