name: PLAUD録音ダイジェストSlack投稿

on:
  schedule:
    - cron: '0 23 * * *'  # 毎朝8:00 JST (= 前日23:00 UTC)
  workflow_dispatch:       # GitHubのActionsタブから手動実行も可能

jobs:
  post-digest:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージのインストール
        run: pip install -r requirements.txt

      - name: 録音要約・Slack投稿
        run: python plaud-slack-bot/plaud_slack_bot.py
        env:
          PLAUD_TOKEN: ${{ secrets.PLAUD_TOKEN }}
          PLAUD_BASE_URL: ${{ secrets.PLAUD_BASE_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
