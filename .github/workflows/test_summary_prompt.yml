name: 面談ログ・要約プロンプトのテスト

on:
  workflow_dispatch:

jobs:
  test-summary-prompt:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージのインストール
        run: pip install -r requirements.txt

      - name: 要約プロンプトのテスト実行（ダミーデータのみ使用）
        run: python meeting-log-sync/test_summary_prompt.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
