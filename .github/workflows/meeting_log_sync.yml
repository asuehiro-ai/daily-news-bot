name: 面談ログ・スプレッドシート連携

on:
  schedule:
    - cron: '30 22 * * *'  # 毎朝7:30 JST (= 前日22:30 UTC)
  workflow_dispatch:        # GitHubのActionsタブから手動実行も可能

jobs:
  sync-meeting-log:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージのインストール
        run: pip install -r requirements.txt

      - name: カレンダー・PLAUD突き合わせ・シート書き込み
        run: python meeting-log-sync/sync_meeting_log.py
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PLAUD_TOKEN: ${{ secrets.PLAUD_TOKEN }}
          PLAUD_BASE_URL: ${{ secrets.PLAUD_BASE_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_MEETING_LOG }}
